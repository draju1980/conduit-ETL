name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: conduit-linux-amd64
          - os: macos-14
            asset_name: conduit-darwin-arm64
          - os: windows-latest
            asset_name: conduit-windows-amd64.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,build]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Build binary
        run: pyinstaller conduit.spec --noconfirm --clean

      - name: Smoke test
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            dist/conduit.exe --help
          else
            chmod +x dist/conduit
            dist/conduit --help
          fi
