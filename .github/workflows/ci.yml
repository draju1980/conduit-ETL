name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: deno install --allow-scripts=npm:@duckdb/node-bindings

      - name: Lint
        run: deno lint src/ts/ tests/ts/ main.ts

      - name: Type check
        run: deno check main.ts mod.ts

      - name: Run tests
        run: deno task test

  publish-dry-run:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify JSR publish (dry run)
        run: deno publish --dry-run --allow-slow-types
